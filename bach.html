<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graduación 2º Bachillerato y CCFF · IES Antonio Gala</title>
<link rel="icon" href="img/escudo.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Cinzel:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --azul-deep:#050d24;
    --azul-1:#0a1f4a;
    --azul-2:#11306b;
    --azul-3:#1746a8;
    --oro-1:#f3d061;
    --oro-2:#e2a900;
    --oro-3:#b88600;
    --crema:#f6ecd0;
    --txt:#f8f3e0;
    --txt-soft:rgba(248,243,224,.72);
    --sombra:0 25px 60px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{min-height:100%}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    color:var(--txt);
    background:var(--azul-deep);
    overflow-x:hidden;position:relative;line-height:1.6;
  }
  .bg{position:fixed;inset:0;z-index:-2;overflow:hidden}
  .bg::before{
    content:"";position:absolute;inset:-10%;
    background:
      radial-gradient(ellipse 60% 40% at 30% 20%, rgba(45,90,180,.55), transparent 60%),
      radial-gradient(ellipse 50% 35% at 70% 80%, rgba(20,55,140,.65), transparent 60%),
      radial-gradient(ellipse 80% 60% at 50% 50%, rgba(15,40,110,.4), transparent 70%),
      linear-gradient(135deg, #050d24 0%, #0a1f4a 40%, #0f2960 70%, #050d24 100%);
  }
  .bg::after{
    content:"";position:absolute;inset:0;
    background:
      repeating-linear-gradient(115deg, transparent 0, transparent 80px, rgba(255,255,255,.018) 80px, rgba(255,255,255,.018) 160px),
      repeating-linear-gradient(65deg, transparent 0, transparent 120px, rgba(0,0,0,.06) 120px, rgba(0,0,0,.06) 240px);
    mix-blend-mode:overlay;
  }
  .sparkles{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden}
  .sparkle{
    position:absolute;width:3px;height:3px;
    background:radial-gradient(circle, rgba(255,224,112,1) 0%, rgba(242,194,0,.6) 40%, transparent 70%);
    border-radius:50%;
    box-shadow:0 0 8px rgba(255,200,80,.8), 0 0 14px rgba(242,194,0,.4);
    animation:twinkle linear infinite;opacity:0;
  }
  @keyframes twinkle{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:1;transform:scale(1.2)}}

  .topbar{
    position:sticky;top:0;z-index:20;
    background:linear-gradient(180deg, rgba(5,13,36,.92) 0%, rgba(5,13,36,.78) 100%);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(242,194,0,.18);
    padding:clamp(12px,3vw,16px) clamp(14px,4vw,28px);
    display:flex;align-items:center;gap:14px;
  }
  .topbar img{
    width:clamp(40px,8vw,52px);height:auto;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,.5)) drop-shadow(0 0 8px rgba(242,194,0,.2));
  }
  .topbar .titles{flex:1;min-width:0}
  .topbar h1{
    font-family:'Cormorant Garamond',serif;font-weight:600;
    font-size:clamp(1rem,4vw,1.35rem);
    background:linear-gradient(180deg,#f3d061,#d4a017);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    line-height:1.15;
  }
  .topbar .sub{
    font-family:'Cinzel',serif;
    font-size:clamp(.65rem,2.5vw,.72rem);
    letter-spacing:.25em;color:var(--txt-soft);
    text-transform:uppercase;margin-top:3px;
  }
  .back{
    color:var(--oro-1);text-decoration:none;
    display:inline-flex;align-items:center;gap:6px;
    padding:9px 14px;border-radius:2px;
    background:rgba(242,194,0,.08);
    border:1px solid rgba(242,194,0,.3);
    font-family:'Cinzel',serif;
    font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;
    transition:all .25s ease;white-space:nowrap;
  }
  .back:hover,.back:focus-visible{
    background:rgba(242,194,0,.18);
    border-color:rgba(242,194,0,.6);outline:none;
  }
  .hero{
    max-width:920px;width:100%;
    margin:0 auto;
    padding:clamp(36px,7vw,64px) clamp(18px,4vw,32px) clamp(18px,4vw,28px);
    text-align:center;
  }
  .ornament{
    display:flex;align-items:center;justify-content:center;gap:18px;
    margin:0 auto 22px;
    color:var(--oro-1);
    font-family:'Cinzel',serif;
    font-size:clamp(.7rem,2.5vw,.82rem);
    letter-spacing:.4em;text-transform:uppercase;
  }
  .ornament::before,.ornament::after{
    content:"";flex:0 1 70px;height:1px;
    background:linear-gradient(90deg, transparent, var(--oro-2), transparent);
  }
  .ornament .dot{
    width:6px;height:6px;border-radius:50%;
    background:radial-gradient(circle,var(--oro-1),var(--oro-3));
    box-shadow:0 0 8px var(--oro-2);
    display:inline-block;margin:0 8px;vertical-align:middle;
  }
  .hero h2{
    font-family:'Cormorant Garamond',serif;font-weight:600;
    font-size:clamp(1.9rem,6.6vw,3.2rem);
    line-height:1.05;
    margin-bottom:.3em;
    background:linear-gradient(180deg, #fff5d0 0%, #f3d061 45%, #d4a017 85%, #b88600 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  .hero h2 em{font-style:italic;font-weight:500}
  .hero p{
    color:var(--txt-soft);max-width:560px;
    margin:8px auto 0;
    font-size:clamp(.95rem,3.3vw,1.05rem);font-weight:300;
  }
  .actions{
    display:flex;flex-wrap:wrap;justify-content:center;gap:12px;
    margin-top:28px;
  }
  .btn{
    display:inline-flex;align-items:center;gap:10px;
    padding:13px 22px;
    font-family:'Cinzel',serif;
    font-size:.75rem;letter-spacing:.22em;text-transform:uppercase;font-weight:600;
    text-decoration:none;border-radius:2px;
    transition:all .3s ease;cursor:pointer;border:0;
  }
  .btn.primary{
    background:linear-gradient(180deg,var(--oro-1) 0%, var(--oro-2) 60%, var(--oro-3) 100%);
    color:var(--azul-deep);
    box-shadow:0 10px 25px rgba(242,194,0,.35), inset 0 1px 0 rgba(255,255,255,.5);
  }
  .btn.primary:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(242,194,0,.5), inset 0 1px 0 rgba(255,255,255,.5)}
  .btn.ghost{
    background:transparent;color:var(--oro-1);
    border:1px solid rgba(242,194,0,.5);
  }
  .btn.ghost:hover{
    background:rgba(242,194,0,.1);
    border-color:var(--oro-1);transform:translateY(-2px);
  }
  .pdf-wrap{
    max-width:920px;width:100%;
    margin:clamp(20px,4vw,32px) auto clamp(40px,7vw,60px);
    padding:0 clamp(14px,3.5vw,24px);
  }
  .pdf-frame-card{
    position:relative;
    background:rgba(5,13,36,.5);
    border:1px solid rgba(242,194,0,.25);
    padding:clamp(10px,2.5vw,18px);border-radius:6px;
    box-shadow:var(--sombra), inset 0 0 0 1px rgba(242,194,0,.06);
  }
  .pdf-frame-card::before,.pdf-frame-card::after{
    content:"";position:absolute;width:18px;height:18px;
    border:1px solid var(--oro-2);opacity:.6;pointer-events:none;
  }
  .pdf-frame-card::before{top:6px;left:6px;border-right:0;border-bottom:0}
  .pdf-frame-card::after{bottom:6px;right:6px;border-left:0;border-top:0}
  .pdf-viewer{
    display:flex;flex-direction:column;
    gap:clamp(8px,2vw,14px);
    min-height:300px;
  }
  .pdf-page{
    display:block;width:100%;height:auto;
    border-radius:3px;
    box-shadow:0 6px 16px rgba(0,0,0,.4);
    background:#fff;
  }
  .pdf-loader{
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    padding:60px 20px;gap:18px;
    color:var(--oro-1);
    font-family:'Cinzel',serif;
    font-size:.72rem;letter-spacing:.25em;text-transform:uppercase;
  }
  .pdf-loader .ring{
    width:46px;height:46px;
    border:2px solid rgba(242,194,0,.18);
    border-top-color:var(--oro-1);
    border-radius:50%;
    animation:spin 1s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .pdf-error{
    text-align:center;padding:36px 20px;
    color:var(--txt-soft);font-size:.9rem;
  }
  .pdf-error a{color:var(--oro-1);text-decoration:underline;text-underline-offset:3px}
  footer{
    text-align:center;padding:30px 16px 22px;
    font-family:'Cinzel',serif;font-size:.7rem;
    letter-spacing:.25em;color:var(--txt-soft);
    text-transform:uppercase;opacity:.55;
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="sparkles" id="sparkles"></div>

<div class="topbar">
  <img src="img/escudo.png" alt="Escudo IES Antonio Gala">
  <div class="titles">
    <h1>2º Bach. y CCFF</h1>
    <div class="sub">IES Antonio Gala</div>
  </div>
  <a href="index.html" class="back" aria-label="Volver">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Volver
  </a>
</div>

<section class="hero">
  <div class="ornament" aria-hidden="true">
    <span><span class="dot"></span>Promoción 2024 · 2025<span class="dot"></span></span>
  </div>
  <h2>Ceremonia <em>de</em> Graduación</h2>
  <p>Acto académico de despedida del alumnado de 2º de Bachillerato y de los Ciclos Formativos.</p>
  <div class="actions">
    <a href="pdfs/graduacion-bach-ccff.pdf" target="_blank" rel="noopener" class="btn primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
      Abrir programa
    </a>
    <a href="pdfs/graduacion-bach-ccff.pdf" download class="btn ghost">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      Descargar
    </a>
  </div>
</section>

<div class="pdf-wrap">
  <div class="pdf-frame-card">
    <div class="pdf-viewer" id="pdfViewer" data-src="pdfs/graduacion-bach-ccff.pdf">
      <div class="pdf-loader" id="pdfLoader">
        <div class="ring"></div>
        <div>Cargando programa</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<footer>
  <span id="y"></span> · I.E.S. Antonio Gala
</footer>

<script>
  (function(){
    const wrap=document.getElementById('sparkles');
    const N=window.matchMedia('(max-width:760px)').matches?28:45;
    for(let i=0;i<N;i++){
      const s=document.createElement('div');s.className='sparkle';
      const size=1+Math.random()*3;
      s.style.width=size+'px';s.style.height=size+'px';
      s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
      s.style.animationDuration=(2.5+Math.random()*4)+'s';
      s.style.animationDelay=(Math.random()*5)+'s';
      wrap.appendChild(s);
    }
  })();
  document.getElementById('y').textContent=new Date().getFullYear();

  // PDF renderer using PDF.js
  (async function(){
    const container=document.getElementById('pdfViewer');
    const loader=document.getElementById('pdfLoader');
    const src=container.getAttribute('data-src');
    try{
      if(!window.pdfjsLib){throw new Error('PDF.js no disponible');}
      pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const pdf=await pdfjsLib.getDocument(src).promise;
      const dpr=Math.min(window.devicePixelRatio||1,2);
      const containerWidth=container.clientWidth;
      for(let i=1;i<=pdf.numPages;i++){
        const page=await pdf.getPage(i);
        const base=page.getViewport({scale:1});
        const cssScale=containerWidth/base.width;
        const viewport=page.getViewport({scale:cssScale*dpr});
        const canvas=document.createElement('canvas');
        canvas.className='pdf-page';
        canvas.width=viewport.width;
        canvas.height=viewport.height;
        canvas.style.aspectRatio=(base.width/base.height).toString();
        container.appendChild(canvas);
        await page.render({canvasContext:canvas.getContext('2d',{alpha:false}),viewport}).promise;
        if(i===1 && loader){loader.remove();}
      }
    }catch(err){
      console.error(err);
      if(loader)loader.remove();
      const fb=document.createElement('div');
      fb.className='pdf-error';
      fb.innerHTML='No se pudo cargar el documento. <a href="'+src+'" target="_blank" rel="noopener">Ábrelo aquí</a>.';
      container.appendChild(fb);
    }
  })();

  let resizeTimer;
  window.addEventListener('resize',()=>{
    clearTimeout(resizeTimer);
    resizeTimer=setTimeout(()=>{
      const container=document.getElementById('pdfViewer');
      if(!container)return;
      const currentWidth=container.clientWidth;
      if(!container.dataset.lastWidth){container.dataset.lastWidth=currentWidth;return;}
      const last=parseFloat(container.dataset.lastWidth);
      if(Math.abs(currentWidth-last)/last>0.2){
        container.dataset.lastWidth=currentWidth;
        location.reload();
      }
    },400);
  });
</script>
</body>
</html>
